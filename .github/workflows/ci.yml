name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          BETTER_AUTH_SECRET: ci-only-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3000
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_SECURE: "false"
          SMTP_USER: ci
          SMTP_PASSWORD: ci
          EMAIL_FROM: CI <ci@example.com>
