name: business-analytics-hub

x-app-environment: &app-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-analytics}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-business_analytics_hub}?schema=public
  DIRECT_URL: postgresql://${POSTGRES_USER:-analytics}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-business_analytics_hub}?schema=public
  REDIS_URL: redis://redis:6379
  BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
  SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD:?Set SMTP_PASSWORD}
  EMAIL_FROM: ${EMAIL_FROM:?Set EMAIL_FROM}
  EMAIL_DELIVERY_ENABLED: ${EMAIL_DELIVERY_ENABLED:-true}
  CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET}
  AI_PROVIDER: ${AI_PROVIDER:-ollama}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
  UPLOAD_DIR: /app/.data/uploads
  SENTRY_DSN: ${SENTRY_DSN:-}
  NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-business_analytics_hub}
      POSTGRES_USER: ${POSTGRES_USER:-analytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  migrate:
    build:
      context: .
      target: migrator
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    restart: unless-stopped
    environment: *app-environment
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads-data:/app/.data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  uploads-data:
